<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DevDash — Design</title>
  <link rel="stylesheet" href="ds/colors_and_type.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,400..600,0..1,0&display=swap" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* Apply DesignStack dark tokens to the whole canvas */
    html { background: #07070a; }
    body { background: #07070a; margin: 0; }
    /* Force dark tokens globally so DC canvas chrome inherits cleanly */
    :root {
      color-scheme: dark;
    }
    body { color: #e4e4e7; }
  </style>
  <!-- Make sure the DS dark class is on root from the get-go -->
  <script>document.documentElement.classList.add('dark');</script>
</head>
<body>
  <div id="root"></div>

  <!-- React -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Design canvas + tweaks + shared primitives -->
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="shared.jsx"></script>

  <!-- Screens -->
  <script type="text/babel" src="screens/dashboard.jsx"></script>
  <script type="text/babel" src="screens/run-view.jsx"></script>
  <script type="text/babel" src="screens/editor.jsx"></script>
  <script type="text/babel" src="screens/history.jsx"></script>
  <script type="text/babel" src="screens/param-modal.jsx"></script>
  <script type="text/babel" src="screens/empty-state.jsx"></script>

  <!-- App -->
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
